set_unit:
  fields:
    address:
      required: false
      selector:
        text:
    unit:
      required: true
      selector:
        select:
          options:
            - C
            - F

set_display_light:
  fields:
    address:
      required: false
      selector:
        text:
    value:
      required: true
      selector:
        number:
          min: 0
          max: 255
          mode: box

set_target:
  fields:
    address:
      required: false
      selector:
        text:
    probe:
      required: true
      selector:
        number:
          min: 1
          max: 4
          mode: box
    mode:
      required: true
      selector:
        select:
          options:
            - "01"
            - "10"
            - "11"
    high_tenths:
      default: 0
      selector:
        number:
          mode: box
    low_tenths:
      default: 0
      selector:
        number:
          mode: box
    degree_index:
      default: 0
      selector:
        number:
          min: 0
          max: 5
          mode: box
    food_index:
      default: -1
      selector:
        number:
          min: -1
          max: 255
          mode: box

set_pre_alarm:
  fields:
    address:
      required: false
      selector:
        text:
    probe:
      required: true
      selector:
        number:
          min: 1
          max: 4
          mode: box
    advance_values:
      required: true
      selector:
        object:

set_timer:
  fields:
    address:
      required: false
      selector:
        text:
    probe:
      required: true
      selector:
        number:
          min: 1
          max: 4
          mode: box
    start_epoch_s:
      required: true
      selector:
        number:
          mode: box
    end_epoch_s:
      required: true
      selector:
        number:
          mode: box
    count_down:
      default: true
      selector:
        boolean:

reset_timer:
  fields:
    address:
      required: false
      selector:
        text:
    probe:
      required: true
      selector:
        number:
          min: 1
          max: 4
